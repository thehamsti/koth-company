name: Release self-hosted images

run-name: Release ${{ inputs.ref }} for hamsti1

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or full SHA to release
        required: true
        default: main
        type: string

concurrency:
  group: release-images-${{ inputs.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.revision.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - id: revision
        name: Resolve immutable revision
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve a full Git SHA" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

      - name: Lint migration runners
        run: bunx oxlint docker/*.ts

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build API
        run: bun run --cwd apps/api build

      - name: Build web application
        run: bun run --cwd apps/web build

      - name: Shellcheck deployment operations
        run: shellcheck deploy/ops/common.sh deploy/ops/deploy deploy/ops/rollback deploy/ops/status

      - name: Validate deployment artifacts
        run: bash deploy/tests/validate.sh

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: cv-worker/uv.lock

      - name: Install CV worker dependencies
        working-directory: cv-worker
        run: uv sync --frozen

      - name: Test CV worker
        working-directory: cv-worker
        run: uv run pytest

      - name: Lint CV worker
        working-directory: cv-worker
        run: uv run ruff check .

      - name: Check CV worker formatting
        working-directory: cv-worker
        run: uv run ruff format --check .

      - name: Create immutable deployment bundle
        env:
          RELEASE_SHA: ${{ steps.revision.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="$RUNNER_TEMP/koth-company-$RELEASE_SHA"
          mkdir -p "$bundle_root"
          git archive "$RELEASE_SHA" deploy docs/twitch-channel-points.md | tar -x -C "$bundle_root"
          printf '%s\n' "$RELEASE_SHA" > "$bundle_root/RELEASE"
          tar \
            --create \
            --gzip \
            --file "koth-deploy-$RELEASE_SHA.tar.gz" \
            --directory "$RUNNER_TEMP" \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            "koth-company-$RELEASE_SHA"

      - name: Upload deployment bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: koth-deploy-${{ steps.revision.outputs.sha }}
          path: koth-deploy-${{ steps.revision.outputs.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: docker/Dockerfile.web
          - image: api
            dockerfile: docker/Dockerfile.api
          - image: migrate
            dockerfile: docker/Dockerfile.migrate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ${{ matrix.image }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/thehamsti/koth-company-${{ matrix.image }}:${{ needs.validate.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true
